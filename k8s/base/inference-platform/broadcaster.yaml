# k8s/base/inference-platform/broadcaster.yaml
# Broadcaster v3 — State publisher for BIFROST control plane
# Consumes Observer signals, derives operating mode, publishes via HTTP/WS
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broadcaster
  namespace: inference-platform
  labels:
    app: broadcaster
    component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broadcaster
  template:
    metadata:
      labels:
        app: broadcaster
        component: control-plane
    spec:
      containers:
      - name: broadcaster
        image: bifrost/broadcaster:3.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8090
          name: http
        env:
        - name: BROADCASTER_POLL_INTERVAL
          value: "10"
        - name: BROADCASTER_PROBE_TIMEOUT
          value: "5"
        - name: OBSERVER_URL
          value: "http://observer.inference-platform.svc.cluster.local:8081"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: broadcaster
  namespace: inference-platform
  labels:
    app: broadcaster
    component: control-plane
spec:
  selector:
    app: broadcaster
  ports:
  - name: http
    port: 8090
    targetPort: 8090
  type: ClusterIP
---
# External access for Bifrost-side Arbiter to consume
apiVersion: v1
kind: Service
metadata:
  name: broadcaster-external
  namespace: inference-platform
  labels:
    app: broadcaster
    component: control-plane
spec:
  selector:
    app: broadcaster
  ports:
  - name: http
    port: 8090
    targetPort: 8090
    nodePort: 30080
  type: NodePort
